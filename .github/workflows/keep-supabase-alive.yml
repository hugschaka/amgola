name: keep-supabase-alive

# שומר את פרויקט ה-Supabase החינמי "ער" — שולח בקשה זעירה כל 3 ימים
# (פרויקט חינמי נכבה אחרי 7 ימים ללא פעילות). אפשר גם להריץ ידנית מ-Actions.
on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -sf \
            "https://bzivvgzqugptgtbqffzg.supabase.co/rest/v1/songs?select=id&limit=1" \
            -H "apikey: sb_publishable_4ZopjP_HcJZ4PybIgzYNFA_JIZQEEsD" \
            -H "Authorization: Bearer sb_publishable_4ZopjP_HcJZ4PybIgzYNFA_JIZQEEsD" \
            && echo "✓ Supabase alive" || (echo "✗ ping failed" && exit 1)
